<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据中心运行监控大屏</title>
<link rel="stylesheet" href="/static/css/theme.css">
<link rel="stylesheet" href="/static/css/layout.css">
<link rel="stylesheet" href="/static/css/components.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>

<div class="grid-container">

  <!-- 标题栏 -->
  <div class="header">
    <span class="header-title">🖥 数据中心运行监控大屏</span>
    <span class="header-time" id="live-time">----&#45;&#45;-- --:--:--</span>
  </div>

  <!-- 统计卡片 -->
  <div class="stat-row">
    <div class="stat-card"><div class="stat-value" id="stat-hosts">--</div><div class="stat-label">主机总数</div></div>
    <div class="stat-card"><div class="stat-value success" id="stat-online">--</div><div class="stat-label">在线主机</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-mods">--</div><div class="stat-label">指标项数</div></div>
    <div class="stat-card"><div class="stat-value danger" id="stat-alerts">--</div><div class="stat-label">告警总数</div></div>
    <div class="stat-card"><div class="stat-value success" id="stat-resolved">--</div><div class="stat-label">已处理</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-health">--%</div><div class="stat-label">整体健康度</div></div>
  </div>

  <!-- 左栏 -->
  <div class="left-col">
    <div class="panel">
      <div class="panel-title">📍 机房健康度分布</div>
      <div class="chart-box" id="chart-room-health"></div>
    </div>
    <div class="panel">
      <div class="panel-title">⚠ 主机风险 TOP5</div>
      <ul class="risk-list" id="risk-list"></ul>
    </div>
    <div class="panel">
      <div class="panel-title">🔥 磁盘使用率 TOP5</div>
      <div class="chart-box" id="chart-disk-top"></div>
    </div>
  </div>

  <!-- 中栏 -->
  <div class="center-col">
    <div class="panel">
      <div class="panel-title">📈 CPU 使用率趋势（7天）</div>
      <div class="chart-box" id="chart-cpu-trend"></div>
    </div>
    <div class="panel">
      <div class="panel-title">📉 系统负载趋势</div>
      <div class="chart-box" id="chart-load-trend"></div>
    </div>
    <div class="panel">
      <div class="panel-title">💾 磁盘读写 TOP5</div>
      <div class="chart-box" id="chart-disk-io"></div>
    </div>
  </div>

  <!-- 右栏 -->
  <div class="right-col">
    <div class="panel">
      <div class="panel-title">📊 内存使用 TOP5</div>
      <div class="chart-box" id="chart-memory-top"></div>
    </div>
    <div class="panel">
      <div class="panel-title">🌐 网络流量</div>
      <div class="chart-box" id="chart-network"></div>
    </div>
    <div class="panel">
      <div class="panel-title">📋 告警列表</div>
      <ul class="alert-list" id="alert-list"></ul>
    </div>
  </div>

</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/charts.js"></script>
<script src="/static/js/app.js"></script>

</body>
</html>
